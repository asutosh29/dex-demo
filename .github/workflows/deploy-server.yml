name: Deploy server image to digitalocean

on:
  push:
    branches:
      - main
    paths:
      - 'apps/server/**'
      - '.github/workflows/deploy-server.yml'

  # For testing out where the problem lies on the hosted instance
  # TODO: Remove it after fix
  pull_request: 
    branches:
      - main
    paths:
      - 'apps/server/**'
      - '.github/workflows/deploy-server.yml'

  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Digital Ocean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DIGITAL_OCEAN_REGISTRY_USERNAME }}
          password: ${{ secrets.DIGITAL_OCEAN_REGISTRY_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: registry.digitalocean.com/dex-registry/dex-server:latest
