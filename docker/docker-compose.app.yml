services:
  server:
    build:
      context: ..
      dockerfile: apps/server/Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - ../apps/server/.env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('https://apidex.amx.run.place/ping', (r) => r.statusCode === 200 ? process.exit(0) : process.exit(1))"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    networks:
      - dex-network
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://apidex.amx.run.place}
    ports:
      - "3000:6767"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://dex.amx.run.place/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - dex-network
    restart: unless-stopped

networks:
  dex-network:
    driver: bridge
